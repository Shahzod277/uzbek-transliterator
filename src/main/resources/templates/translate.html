<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sheva - O'zbek transliteratsiyasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #f43f5e;
            --bg: #0f172a;
            --card: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text: #f8fafc;
            --text-muted: rgba(255,255,255,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: ''; position: fixed; top: -30%; left: -20%;
            width: 140%; height: 140%;
            background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(244,63,94,0.08) 0%, transparent 50%);
            z-index: 0; pointer-events: none;
        }

        .container {
            max-width: 900px; margin: 0 auto;
            padding: 40px 20px; position: relative; z-index: 1;
        }

        /* Header */
        .header {
            text-align: center; margin-bottom: 40px;
            animation: fadeIn 0.6s ease;
        }
        .header img {
            width: 64px; height: 64px; border-radius: 50%;
            object-fit: cover; margin-bottom: 16px;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 20px rgba(99,102,241,0.3);
        }
        .header h1 {
            font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .header h1 span { color: var(--primary); }
        .header p { color: var(--text-muted); font-size: 15px; }

        /* Mode Selector */
        .mode-selector {
            display: flex; gap: 8px; justify-content: center;
            margin-bottom: 28px; flex-wrap: wrap;
            animation: fadeIn 0.6s ease 0.1s both;
        }
        .mode-btn {
            padding: 10px 20px; border-radius: 50px;
            border: 2px solid var(--border); background: transparent;
            color: var(--text-muted); font-size: 13px; font-weight: 600;
            font-family: 'Inter', sans-serif; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .mode-btn:hover { border-color: var(--primary); color: var(--text); }
        .mode-btn.active {
            background: var(--primary); border-color: var(--primary);
            color: #fff; box-shadow: 0 4px 16px rgba(99,102,241,0.35);
        }

        /* Translator Card */
        .translator {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; overflow: hidden;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease 0.2s both;
        }
        .translator-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            min-height: 300px;
        }
        .translator-panel {
            padding: 24px; display: flex; flex-direction: column;
        }
        .translator-panel:first-child {
            border-right: 1px solid var(--border);
        }
        .panel-label {
            font-size: 12px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-muted); margin-bottom: 14px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .panel-label .clear-btn {
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 14px; padding: 4px;
            transition: color 0.2s; display: none;
        }
        .panel-label .clear-btn.visible { display: inline; }
        .panel-label .clear-btn:hover { color: var(--accent); }

        textarea {
            flex: 1; width: 100%; border: none; outline: none;
            background: transparent; color: var(--text);
            font-size: 18px; font-family: 'Inter', sans-serif;
            resize: none; line-height: 1.6;
        }
        textarea::placeholder { color: rgba(255,255,255,0.15); }

        .result-text {
            flex: 1; font-size: 18px; line-height: 1.6;
            color: var(--text); word-break: break-word;
            white-space: pre-wrap;
        }
        .result-placeholder {
            color: rgba(255,255,255,0.15); font-size: 18px;
        }

        /* Bottom Bar */
        .translator-bottom {
            border-top: 1px solid var(--border);
            padding: 14px 24px; display: flex;
            align-items: center; justify-content: space-between;
        }
        .char-count {
            font-size: 12px; color: var(--text-muted); font-weight: 500;
        }
        .copy-btn {
            padding: 8px 18px; border-radius: 10px;
            border: 1px solid var(--border); background: rgba(255,255,255,0.04);
            color: var(--text-muted); font-size: 13px; font-weight: 600;
            font-family: 'Inter', sans-serif; cursor: pointer;
            transition: all 0.3s; display: flex; align-items: center; gap: 6px;
        }
        .copy-btn:hover {
            border-color: var(--primary); color: var(--primary);
            background: rgba(99,102,241,0.08);
        }
        .copy-btn.copied {
            border-color: #10b981; color: #10b981;
            background: rgba(16,185,129,0.08);
        }

        /* Swap Button */
        .swap-btn {
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--bg); border: 2px solid var(--border);
            color: var(--text-muted); cursor: pointer;
            display: none; align-items: center; justify-content: center;
            font-size: 16px; transition: all 0.3s; z-index: 2;
        }

        /* Footer */
        .footer {
            text-align: center; margin-top: 32px;
            color: var(--text-muted); font-size: 12px;
            animation: fadeIn 0.6s ease 0.3s both;
        }
        .footer a {
            color: var(--primary); text-decoration: none; font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .translator-grid { grid-template-columns: 1fr; }
            .translator-panel:first-child {
                border-right: none; border-bottom: 1px solid var(--border);
            }
            .translator-panel { min-height: 160px; }
            .header h1 { font-size: 22px; }
            textarea, .result-text { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img th:src="@{/img/logo.jpg}" alt="Sheva">
            <h1><span>Sheva</span> Transliteratsiya</h1>
            <p>O'zbek yozuvlarini bir-biriga o'girish</p>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" data-type="LITERARY_TO_NEW">
                <i class="bi bi-arrow-right-short"></i> Adabiy → Yangi
            </button>
            <button class="mode-btn" data-type="LITERARY_TO_TRADITIONAL">
                <i class="bi bi-arrow-right-short"></i> Adabiy → Kirill
            </button>
            <button class="mode-btn" data-type="TRADITIONAL_TO_NEW">
                <i class="bi bi-arrow-right-short"></i> Kirill → Yangi
            </button>
        </div>

        <div class="translator" style="position:relative;">
            <div class="translator-grid">
                <div class="translator-panel">
                    <div class="panel-label">
                        <span id="inputLabel">Adabiy til (lotin)</span>
                        <button class="clear-btn" id="clearBtn" onclick="clearInput()" title="Tozalash">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    <textarea id="inputText" placeholder="Matn kiriting..." autofocus></textarea>
                </div>
                <div class="translator-panel">
                    <div class="panel-label">
                        <span id="outputLabel">Yangi transkripsiya</span>
                    </div>
                    <div class="result-text" id="resultText">
                        <span class="result-placeholder">Natija shu yerda ko'rinadi</span>
                    </div>
                </div>
            </div>
            <div class="translator-bottom">
                <span class="char-count"><span id="charCount">0</span> belgi</span>
                <button class="copy-btn" id="copyBtn" onclick="copyResult()">
                    <i class="bi bi-clipboard"></i> Nusxalash
                </button>
            </div>
        </div>

        <div class="footer">
            Telegram bot: <a href="https://t.me/uzbek_translit_bot" target="_blank">@uzbek_translit_bot</a>
        </div>
    </div>

    <script>
        let currentType = 'LITERARY_TO_NEW';
        let debounceTimer = null;
        let lastResult = '';

        const labels = {
            LITERARY_TO_NEW: { input: 'Adabiy til (lotin)', output: 'Yangi transkripsiya' },
            LITERARY_TO_TRADITIONAL: { input: 'Adabiy til (lotin)', output: "An'anaviy (kirill)" },
            TRADITIONAL_TO_NEW: { input: "An'anaviy (kirill)", output: 'Yangi transkripsiya' }
        };

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.dataset.type;
                document.getElementById('inputLabel').textContent = labels[currentType].input;
                document.getElementById('outputLabel').textContent = labels[currentType].output;
                translate();
            });
        });

        document.getElementById('inputText').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length;
            document.getElementById('clearBtn').classList.toggle('visible', this.value.length > 0);
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(translate, 200);
        });

        function translate() {
            const text = document.getElementById('inputText').value;
            if (!text.trim()) {
                document.getElementById('resultText').innerHTML = '<span class="result-placeholder">Natija shu yerda ko\'rinadi</span>';
                lastResult = '';
                return;
            }
            fetch('/api/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, type: currentType })
            })
            .then(r => r.json())
            .then(data => {
                lastResult = data.result;
                document.getElementById('resultText').textContent = data.result;
            });
        }

        function clearInput() {
            document.getElementById('inputText').value = '';
            document.getElementById('charCount').textContent = '0';
            document.getElementById('clearBtn').classList.remove('visible');
            document.getElementById('resultText').innerHTML = '<span class="result-placeholder">Natija shu yerda ko\'rinadi</span>';
            lastResult = '';
            document.getElementById('inputText').focus();
        }

        function copyResult() {
            if (!lastResult) return;
            navigator.clipboard.writeText(lastResult);
            const btn = document.getElementById('copyBtn');
            btn.classList.add('copied');
            btn.innerHTML = '<i class="bi bi-check-lg"></i> Nusxalandi!';
            setTimeout(() => {
                btn.classList.remove('copied');
                btn.innerHTML = '<i class="bi bi-clipboard"></i> Nusxalash';
            }, 2000);
        }
    </script>
</body>
</html>
