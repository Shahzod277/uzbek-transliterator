<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Kirish</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
            background: #0f172a; overflow: hidden;
            position: relative;
        }
        body::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 50%, rgba(244, 63, 94, 0.1) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 60%);
            animation: bgShift 15s ease-in-out infinite alternate;
        }
        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-3%, 3%) rotate(2deg); }
        }

        .login-wrapper {
            position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 20px;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px; padding: 48px 40px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.3);
        }

        .brand-logo-wrapper {
            display: flex; justify-content: center; margin-bottom: 28px;
        }
        .brand-logo {
            width: 90px; height: 90px; border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4),
                        0 0 0 6px rgba(99, 102, 241, 0.1);
        }

        h2 { color: #fff; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .subtitle { color: rgba(255,255,255,0.45); font-size: 14px; margin-top: 6px; margin-bottom: 32px; }

        .alert-error {
            background: rgba(244, 63, 94, 0.1); border: 1px solid rgba(244, 63, 94, 0.2);
            color: #fb7185; padding: 12px 16px; border-radius: 12px;
            font-size: 13px; font-weight: 500; margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px;
        }

        .form-group { margin-bottom: 24px; }
        .form-group label {
            display: block; color: rgba(255,255,255,0.6); font-size: 13px;
            font-weight: 600; margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            color: rgba(255,255,255,0.25); font-size: 18px;
            transition: all 0.3s;
        }
        .input-wrapper input {
            width: 100%; padding: 14px 16px 14px 48px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.08);
            border-radius: 14px; color: #fff;
            font-size: 15px; font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        .input-wrapper input::placeholder { color: rgba(255,255,255,0.2); }
        .input-wrapper input:focus {
            outline: none; border-color: #6366f1;
            background: rgba(99, 102, 241, 0.06);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }
        .input-wrapper input:focus + i, .input-wrapper input:focus ~ i {
            color: #6366f1;
        }

        .btn-login {
            width: 100%; padding: 14px; border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff; font-size: 15px; font-weight: 700;
            font-family: 'Inter', sans-serif;
            border-radius: 14px; cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(99, 102, 241, 0.45);
        }
        .btn-login:active { transform: translateY(0); }

        .footer-text {
            text-align: center; margin-top: 28px;
            color: rgba(255,255,255,0.2); font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand-logo-wrapper">
                <img th:src="@{/img/logo.jpg}" alt="Sheva" class="brand-logo">
            </div>
            <h2>Xush kelibsiz</h2>
            <p class="subtitle">Sheva Admin paneliga kirish</p>
            <div th:if="${error}" class="alert-error">
                <i class="bi bi-exclamation-circle"></i> Parol noto'g'ri! Qayta urinib ko'ring.
            </div>
            <form method="post" th:action="@{/admin/login}">
                <div class="form-group">
                    <label>Parol</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" placeholder="Admin parolni kiriting" required autofocus>
                        <i class="bi bi-lock-fill"></i>
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    Kirish <i class="bi bi-arrow-right"></i>
                </button>
            </form>
            <p class="footer-text">Sheva Transliteratsiya &copy; 2026</p>
        </div>
    </div>
</body>
</html>
